name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build backend
        working-directory: backend
        run: gradle --no-daemon clean build

      - name: Smoke test (local H2 profile)
        working-directory: backend
        run: |
          JAR=$(ls build/libs/*.jar | grep -v plain | head -n1)
          echo "Booting $JAR with the local profile..."
          java -jar "$JAR" --spring.profiles.active=local &
          APP_PID=$!
          UP=0
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null; then UP=1; break; fi
            sleep 3
          done
          if [ "$UP" != "1" ]; then echo "App failed to start"; kill $APP_PID 2>/dev/null; exit 1; fi
          echo "Health:"; curl -s http://localhost:8080/actuator/health; echo
          echo "Schools (first 500 chars):"; curl -s http://localhost:8080/api/v1/schools | head -c 500; echo
          kill $APP_PID 2>/dev/null

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          if-no-files-found: error

  android:
    name: Android (Compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Assemble debug APK
        working-directory: android
        run: gradle --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
