# Lightweight local profile: in-memory H2, no PostgreSQL or Docker required.
# Run with:  gradle bootRun --args='--spring.profiles.active=local'
spring:
  datasource:
    url: jdbc:h2:mem:schoolfinder;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create          # Hibernate builds the schema from the entities
    defer-datasource-initialization: true  # so seed-local.sql runs AFTER tables exist
  flyway:
    enabled: false              # Flyway migrations are PostgreSQL-specific; skip them here
  sql:
    init:
      mode: always
      data-locations: classpath:seed-local.sql
  h2:
    console:
      enabled: true             # browse the DB at http://localhost:8080/h2-console

app:
  firebase:
    enabled: false              # dev auth via X-Debug-* headers
