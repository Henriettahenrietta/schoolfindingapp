<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>UniMatch Cameroon — Find Your Future University</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- PWA: installable on phones -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#800020" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UniMatch" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">UM</span>
      <div>
        <h1>UniMatch Cameroon</h1>
        <p class="tag">Find Your Future University</p>
      </div>
    </div>
    <div class="identity" id="identity"><!-- filled by JS --></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="discover">Discover</button>
    <button class="tab" data-view="compare">Compare <span id="compareCount" class="pill">0</span></button>
    <button class="tab" data-view="favorites">Favourites</button>
    <button class="tab student-only" data-view="student" style="display:none">My Dashboard</button>
    <button class="tab admin-only" data-view="admin" style="display:none">Admin</button>
  </nav>

  <main>
    <!-- Discover -->
    <section id="view-discover" class="view active">
      <form id="searchForm" class="filters">
        <input type="search" id="q" placeholder="Search universities by name…" />
        <select id="sort">
          <option value="name">Sort: Name</option>
          <option value="tuition">Sort: Tuition (low→high)</option>
          <option value="newest">Sort: Newest</option>
        </select>
        <button type="submit">Search</button>
      </form>
      <p id="resultMeta" class="muted"></p>
      <div id="results" class="grid"></div>
    </section>

    <!-- Compare -->
    <section id="view-compare" class="view">
      <h2>Compare schools</h2>
      <p class="muted">Tick “Compare” on 2–4 schools in Discover, then come back here.</p>
      <div id="compareResult"></div>
    </section>

    <!-- Favourites -->
    <section id="view-favorites" class="view">
      <h2>Favourites</h2>
      <p class="muted" id="favHint"></p>
      <div id="favorites" class="grid"></div>
    </section>

    <!-- Student dashboard -->
    <section id="view-student" class="view">
      <h2>My dashboard</h2>
      <div id="studentPanel"></div>
    </section>

    <!-- Admin -->
    <section id="view-admin" class="view">
      <div class="admin-layout">
        <aside class="admin-side">
          <div class="admin-side-title">Admin</div>
          <button class="aside active" data-asub="analytics">📊 Analytics</button>
          <button class="aside" data-asub="schools">🏫 Universities <span class="abadge" id="b-schools"></span></button>
          <button class="aside" data-asub="users">👥 Users <span class="abadge" id="b-users"></span></button>
          <button class="aside" data-asub="reviews">⭐ Reviews <span class="abadge" id="b-reviews"></span></button>
          <button class="aside" data-asub="messages">✉️ Messages <span class="abadge" id="b-messages"></span></button>
        </aside>
        <div id="adminPanel" class="admin-content"></div>
      </div>
    </section>
  </main>

  <!-- Detail modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button class="close" id="modalClose">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Auth modal -->
  <div id="authModal" class="modal hidden">
    <div class="modal-card auth-card">
      <button class="close" id="authClose">✕</button>
      <div class="auth-brand">
        <span class="logo">UM</span>
        <div>
          <h2>UniMatch Cameroon</h2>
          <p class="muted">Find Your Future University</p>
        </div>
      </div>
      <div id="authBody"></div>
    </div>
  </div>

  <!-- First-visit install prompt -->
  <div id="installBanner" class="install-banner hidden">
    <img src="icons/icon-192.png" alt="UniMatch" class="ib-icon">
    <div class="ib-text"><b>Install UniMatch Cameroon</b><span>Add it to your home screen and use it like an app.</span></div>
    <div class="ib-actions">
      <button id="ibInstall" class="btn primary">Install</button>
      <button id="ibClose" class="btn">Not now</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- Firebase (compat) — used only when firebase-config.js has an apiKey -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
